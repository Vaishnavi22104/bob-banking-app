{% extends "base.html" %}
{% block title %}Login — SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">

    <!-- Bank logo / heading -->
    <div class="text-center mb-4 mt-3">
      <div class="login-icon-wrapper mx-auto mb-3">
        <i class="bi bi-bank2 text-primary" style="font-size: 2.8rem;"></i>
      </div>
      <h1 class="h3 fw-bold text-dark">Customer Login</h1>
      <p class="text-muted small">Sign in to access your account</p>
    </div>

    <!-- Login card -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('login') }}" novalidate>

          <!-- Username -->
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">
              <i class="bi bi-person me-1 text-primary"></i>Username
            </label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control form-control-lg"
              placeholder="Enter your username"
              autocomplete="username"
              required
              autofocus
            />
          </div>

          <!-- Password -->
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">
              <i class="bi bi-lock me-1 text-primary"></i>Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control form-control-lg"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>

          <!-- Submit -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </div>

        </form>
      </div>
    </div>

    <!-- Security note -->
    <p class="text-center text-muted small mt-3">
      <i class="bi bi-shield-lock me-1"></i>
      Your connection is protected. Never share your credentials.
    </p>

  </div>
</div>
{% endblock %}
